# Publishes the static site to GitHub Pages and injects the Supabase anon key from
# Settings → Environments → github-pages → BOOK_NOW_FORM_KEY
#
# Repo Settings → Pages → Build and deployment → Source: GitHub Actions (required).

name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject BOOK_NOW_FORM_KEY into contact form
        env:
          BOOK_NOW_FORM_KEY: ${{ secrets.BOOK_NOW_FORM_KEY }}
        run: |
          python3 << 'PY'
          import os
          import pathlib

          key = os.environ.get("BOOK_NOW_FORM_KEY") or ""
          path = pathlib.Path("contact/index.html")
          text = path.read_text(encoding="utf-8")
          marker = "__BOOK_NOW_FORM_KEY__"
          if marker not in text:
              raise SystemExit(f"Expected placeholder {marker} in contact/index.html")
          path.write_text(text.replace(marker, key), encoding="utf-8")
          PY

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
